  <text x="688" y="408" font-family="Arial, sans-serif" font-size="10" fill="#15803D" text-anchor="middle">₹2,940 received (UPI) ✓</text>
  <rect x="790" y="405" width="10" height="20" rx="2" fill="#D97706" opacity="0.4"/>


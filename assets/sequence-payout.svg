  <path d="M290,462 Q340,462 340,473 Q340,484 290,484" fill="none" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#sa)"/>
  <text x="365" y="477" font-family="Arial, sans-serif" font-size="10" fill="#475569">Trust score 0.74 → 0.76 · Async audit log written</text>


  <text x="450" y="28" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="middle">Flood → ₹2,940 Paid in &lt;2 Hours — Sequence Diagram</text>
  <line x1="150" y1="36" x2="750" y2="36" stroke="#E2E8F0" stroke-width="1"/>


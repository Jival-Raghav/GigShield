<svg width="900" height="130" viewBox="0 0 900 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4"/>
      <stop offset="100%" style="stop-color:#DCFCE7"/>
    </linearGradient>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED"/>
      <stop offset="100%" style="stop-color:#FED7AA"/>
    </linearGradient>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F3FF"/>
      <stop offset="100%" style="stop-color:#EDE9FE"/>
    </linearGradient>
  </defs>

  <!-- Card 1 -->
  <rect x="10" y="10" width="205" height="110" rx="10" fill="url(#bg1)" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="30" y="45" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#1D4ED8">15M+</text>
  <text x="30" y="68" font-family="Arial, sans-serif" font-size="12" fill="#1E40AF">gig workers in India</text>
  <text x="30" y="86" font-family="Arial, sans-serif" font-size="12" fill="#1E40AF">by 2025 — growing fast</text>
  <text x="30" y="108" font-family="Arial, sans-serif" font-size="10" fill="#93C5FD">📈 Swiggy, Zomato, Amazon, Zepto</text>

  <!-- Card 2 -->
  <rect x="230" y="10" width="205" height="110" rx="10" fill="url(#bg2)" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="250" y="45" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#15803D">43%</text>
  <text x="250" y="68" font-family="Arial, sans-serif" font-size="12" fill="#166534">rise in extreme weather</text>
  <text x="250" y="86" font-family="Arial, sans-serif" font-size="12" fill="#166534">events across India</text>
  <text x="250" y="108" font-family="Arial, sans-serif" font-size="10" fill="#86EFAC">🌧️ Monsoon, floods, heatwaves</text>

  <!-- Card 3 -->
  <rect x="450" y="10" width="205" height="110" rx="10" fill="url(#bg3)" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="470" y="45" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#C2410C">10B+</text>
  <text x="470" y="68" font-family="Arial, sans-serif" font-size="12" fill="#9A3412">UPI transactions/month</text>
  <text x="470" y="86" font-family="Arial, sans-serif" font-size="12" fill="#9A3412">enable instant payouts</text>
  <text x="470" y="108" font-family="Arial, sans-serif" font-size="10" fill="#FDBA74">💸 Real-time payment rails ready</text>

  <!-- Card 4 -->
  <rect x="670" y="10" width="220" height="110" rx="10" fill="url(#bg4)" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="690" y="45" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#6D28D9">Public APIs</text>
  <text x="690" y="68" font-family="Arial, sans-serif" font-size="12" fill="#5B21B6">IMD, CPCB, NDMA now</text>
  <text x="690" y="86" font-family="Arial, sans-serif" font-size="12" fill="#5B21B6">make real-time parametric</text>
  <text x="690" y="104" font-family="Arial, sans-serif" font-size="12" fill="#5B21B6">insurance viable</text>
</svg>

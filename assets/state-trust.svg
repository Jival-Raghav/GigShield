<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="420" fill="#F8FAFC" rx="12"/>
  <rect x="1" y="1" width="898" height="418" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="28" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="middle">Worker Trust Score — State Diagram</text>
  <line x1="200" y1="36" x2="700" y2="36" stroke="#E2E8F0" stroke-width="1"/>

  <defs>
    <marker id="ta" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="tg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16A34A"/>
    </marker>
    <marker id="tr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/>
    </marker>
    <marker id="tp" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- START -->
  <circle cx="80" cy="210" r="14" fill="#1E293B"/>
  <line x1="94" y1="210" x2="125" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#ta)"/>

  <!-- Cold Start state -->
  <rect x="127" y="178" width="140" height="64" rx="10" fill="#FEF9C3" stroke="#D97706" stroke-width="2"/>
  <text x="197" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#78350F" text-anchor="middle">Cold Start</text>
  <text x="197" y="216" font-family="Arial, sans-serif" font-size="10" fill="#92400E" text-anchor="middle">trust = 0.6 (fixed)</text>
  <text x="197" y="230" font-family="Arial, sans-serif" font-size="10" fill="#92400E" text-anchor="middle">first 3 claims</text>

  <!-- Cold Start → Active -->
  <line x1="267" y1="210" x2="315" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#ta)"/>
  <text x="291" y="203" font-family="Arial, sans-serif" font-size="9" fill="#475569" text-anchor="middle">3 claims done</text>

  <!-- Active state -->
  <rect x="317" y="178" width="140" height="64" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="387" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1E3A8A" text-anchor="middle">Active</text>
  <text x="387" y="216" font-family="Arial, sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle">trust updates live</text>
  <text x="387" y="230" font-family="Arial, sans-serif" font-size="10" fill="#1D4ED8" text-anchor="middle">asymmetric weights</text>

  <!-- Active → Trusted -->
  <line x1="457" y1="196" x2="505" y2="165" stroke="#16A34A" stroke-width="1.5" marker-end="url(#tg)"/>
  <text x="476" y="173" font-family="Arial, sans-serif" font-size="9" fill="#16A34A">BAF &gt; 0.7</text>
  <text x="476" y="183" font-family="Arial, sans-serif" font-size="9" fill="#16A34A">sustained</text>

  <!-- Trusted state -->
  <rect x="507" y="118" width="155" height="64" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="585" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#14532D" text-anchor="middle">Trusted</text>
  <text x="585" y="156" font-family="Arial, sans-serif" font-size="10" fill="#15803D" text-anchor="middle">premium discount</text>
  <text x="585" y="170" font-family="Arial, sans-serif" font-size="10" fill="#15803D" text-anchor="middle">trust score &gt; 0.8</text>

  <!-- Active → Monitored -->
  <line x1="457" y1="224" x2="505" y2="258" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#ta)"/>
  <text x="476" y="248" font-family="Arial, sans-serif" font-size="9" fill="#D97706">BAF &lt; 0.4</text>
  <text x="476" y="258" font-family="Arial, sans-serif" font-size="9" fill="#D97706">twice</text>

  <!-- Monitored state -->
  <rect x="507" y="240" width="155" height="64" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="585" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#78350F" text-anchor="middle">Monitored</text>
  <text x="585" y="278" font-family="Arial, sans-serif" font-size="10" fill="#92400E" text-anchor="middle">closer audit scrutiny</text>
  <text x="585" y="292" font-family="Arial, sans-serif" font-size="10" fill="#92400E" text-anchor="middle">trust 0.4–0.6</text>

  <!-- Monitored → Restricted -->
  <line x1="662" y1="272" x2="710" y2="272" stroke="#EF4444" stroke-width="1.5" marker-end="url(#tr)"/>
  <text x="686" y="265" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" text-anchor="middle">BAF &lt; 0.4</text>
  <text x="686" y="275" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" text-anchor="middle">3rd time</text>

  <!-- Restricted state -->
  <rect x="712" y="240" width="155" height="64" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="790" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#7F1D1D" text-anchor="middle">Restricted</text>
  <text x="790" y="278" font-family="Arial, sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">penalty applied</text>
  <text x="790" y="292" font-family="Arial, sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">to BAF floor</text>

  <!-- Restricted → Active (recovery) -->
  <path d="M790,304 Q790,360 587,360 Q387,360 387,244" fill="none" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#tg)"/>
  <text x="590" y="376" font-family="Arial, sans-serif" font-size="9" fill="#16A34A" text-anchor="middle">5 clean claims → reinstated to Active</text>

  <!-- Protected state (catastrophic) -->
  <rect x="712" y="118" width="155" height="64" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="790" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4C1D95" text-anchor="middle">Protected</text>
  <text x="790" y="156" font-family="Arial, sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">catastrophic event</text>
  <text x="790" y="170" font-family="Arial, sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">penalties suspended</text>

  <!-- Any state → Protected note -->
  <text x="790" y="105" font-family="Arial, sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle">«from any state»</text>
  <text x="790" y="96" font-family="Arial, sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle">if severity &gt; 0.9</text>

  <!-- Trusted → Active (if BAF drops) -->
  <path d="M507,148 Q460,148 460,196 L458,196" fill="none" stroke="#EF4444" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#tr)"/>
  <text x="468" y="145" font-family="Arial, sans-serif" font-size="9" fill="#EF4444">BAF drops</text>

  <!-- Legend -->
  <rect x="30" y="340" width="400" height="65" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="360" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1E293B">Legend</text>
  <rect x="50" y="368" width="14" height="14" rx="3" fill="#FEF9C3" stroke="#D97706" stroke-width="1"/>
  <text x="70" y="380" font-family="Arial, sans-serif" font-size="10" fill="#475569">Cold Start (no penalties)</text>
  <rect x="190" y="368" width="14" height="14" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="210" y="380" font-family="Arial, sans-serif" font-size="10" fill="#475569">Active (normal operation)</text>
  <rect x="50" y="390" width="14" height="14" rx="3" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
  <text x="70" y="402" font-family="Arial, sans-serif" font-size="10" fill="#475569">Trusted (discount applied)</text>
  <rect x="190" y="390" width="14" height="14" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="210" y="402" font-family="Arial, sans-serif" font-size="10" fill="#475569">Restricted (penalty applied)</text>
</svg>
